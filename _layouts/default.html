<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>
    <div class="{% if page.layout == 'home' %}page-wrapper-home{% endif %}">

      {%- include header.html -%}

      <main class="page-content" aria-label="Content">
        {%- if page.full_width -%}
          {{ content }}
        {%- else -%}
          <div class="wrapper">
            {{ content }}
          </div>
        {%- endif -%}
      </main>

      {%- include footer.html -%}

    </div>
  </body>

</html>
